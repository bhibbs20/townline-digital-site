<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Townline Digital</title>
    <meta
      name="description"
      content="Contact Townline Digital for a clean, modern website quote for your local business."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=League+Spartan:wght@600;700;800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="contact" data-href="contact.html">
    <div class="site-shell">
      <header class="site-header">
        <div class="shell header-shell">
          <a class="brand-link" href="index.html" aria-label="Townline Digital home">
            <img class="brand-logo" src="" alt="">
            <span class="brand-copy">
              <span class="brand-name"></span>
              <span class="brand-slogan"></span>
            </span>
          </a>
          <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
          <nav id="site-nav" class="site-nav" aria-label="Primary navigation"></nav>
        </div>
      </header>

      <main id="page-content"></main>

      <footer class="site-footer">
        <div class="shell footer-shell">
          <div class="footer-brand">
            <div class="footer-brand-top">
              <img class="footer-logo" src="" alt="">
              <p class="footer-name"></p>
              <p class="footer-slogan"></p>
            </div>
            <p class="footer-intro"></p>
          </div>
          <nav class="footer-nav" aria-label="Footer navigation"></nav>
          <div class="footer-contact">
            <p class="footer-area"></p>
            <a class="footer-email" href="#"></a>
            <a class="footer-phone" href="#"></a>
            <p class="footer-note"></p>
          </div>
        </div>
      </footer>
    </div>

    <noscript>This site uses a small amount of JavaScript to render shared page content.</noscript>
    <script src="content.js"></script>
    <script src="app.js"></script>
  </body>
</html>
